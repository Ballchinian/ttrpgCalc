<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Bootstrap 5 CSS is bundled via src/index.jsx (import 'bootstrap/dist/css/bootstrap.min.css') -->
        <!-- Security headers (incl. Content-Security-Policy) are served in production via public/_headers,
             so they don't interfere with the Vite dev server's HMR (which needs inline/eval/ws). -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="icon" type="image/png" href="/src/images/logos/die.png" />
        <title>Pathfinder Calculator</title>
    </head>
    <body>
        <div id="root"></div>

        <!-- react-bootstrap v2 provides its own JS behaviour; the old Bootstrap 4 jQuery/Popper/JS scripts are not needed -->
        <script type="module" src="/src/index.jsx"></script>
    </body>
</html>
